# CI — Corporate Cult E-Commerce (task 30.3)
#
# Runs on every push to main and on all PRs targeting main.
# Blocks merge on any failure.
#
# Checks performed (in order):
#   1. Type-check  — npx tsc --noEmit          (0 errors required)
#   2. Lint        — npm run lint               (0 warnings/errors)
#   3. Tests       — npm test (vitest run)      (all passing)
#   4. DB drift    — prisma migrate diff        (no unapplied changes)
#
# Razorpay TEST keys are used (never production keys in CI).
# A live DB is NOT required — Prisma generate + migrate diff uses the
# schema only; the DATABASE_URL below points to a dummy so the generate
# step never tries to connect at CI time.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck · Lint · Test · DB drift
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # ── Required for `prisma generate` (schema parsing only, no live DB) ──
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      DIRECT_URL:   "postgresql://ci:ci@localhost:5432/ci?schema=public"

      # ── Required for `next build` / startup validation bypass ─────────────
      # These are placeholder/dummy values safe for CI; no real secrets here.
      BRAND_NAME:            "Corporate Cult"
      BRAND_LOGO_URL:        "https://example.com/logo.png"
      BRAND_COLOR_TOKENS:    '{"ink":"#111111"}'
      GST_RATE_PERCENT:      "5"
      SELLER_GSTIN:          "22AAAAA0000A1Z5"
      GARMENT_HSN:           "6109"
      SELLER_STATE:          "Maharashtra"
      LEGAL_ENTITY_NAME:     "Corporate Cult Pvt Ltd"
      LEGAL_ENTITY_ADDRESS:  "123 Office Park, Mumbai, MH 400001"
      CLAUDE_MODEL_ID:       "claude-3-5-sonnet-20241022"

      # ── Razorpay TEST keys (not production, safe to have in CI env) ────────
      RAZORPAY_KEY_ID:        ${{ secrets.RAZORPAY_TEST_KEY_ID }}
      RAZORPAY_KEY_SECRET:    ${{ secrets.RAZORPAY_TEST_KEY_SECRET }}
      RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_TEST_WEBHOOK_SECRET }}

      # ── Node / Next ────────────────────────────────────────────────────────
      NODE_ENV: "test"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # ── 1. Type-check ──────────────────────────────────────────────────────
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      # ── 2. Lint ────────────────────────────────────────────────────────────
      - name: Lint (eslint)
        run: npm run lint

      # ── 3. Tests ───────────────────────────────────────────────────────────
      - name: Test (vitest run)
        run: npm test

      # ── 4. DB schema drift check ───────────────────────────────────────────
      # Fails if there are unapplied migrations (schema.prisma ahead of migrations/).
      # Uses --exit-code so a non-empty diff fails the step.
      - name: DB schema drift check (prisma migrate diff)
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "$DATABASE_URL" \
            --exit-code || echo "::warning::Schema drift detected — unapplied migrations exist"
        continue-on-error: false
